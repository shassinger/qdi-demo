name: Test

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Bootstrap
        run: ./scripts/bootstrap
      - name: Test native QDI lifecycle
        run: .venv/bin/python qdi-core/python/test_qdi.py
      - name: Test API and web console
        run: .venv/bin/python -m pytest
      - name: Smoke-test launcher
        run: |
          QDI_SKIP_BOOTSTRAP=1 ./scripts/start --background
          curl --fail --silent http://127.0.0.1:8000/ | grep --quiet "Quantum Device Interface"
          curl --fail --silent http://127.0.0.1:8000/health | grep --quiet '"status":"ok"'
